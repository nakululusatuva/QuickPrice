# Optional Nginx virtual-host example. Replace the server name and certificate
# paths, then include this file from the active Nginx configuration.
# When Cloudflare fronts the origin, restore $remote_addr with ngx_http_realip
# using Cloudflare's maintained address ranges and block direct origin access.
# Never pass a client-supplied CF-Connecting-IP value through unchanged.
# Configure QUICKPRICE_ADMIN_TRUSTED_PROXY_IPS=127.0.0.1 because this proxy
# overwrites X-Real-IP and X-Forwarded-Proto before connecting from loopback.
log_format quickprice_safe '$remote_addr - $remote_user [$time_local] '
                           '"$request_method $uri $server_protocol" $status $body_bytes_sent '
                           '"$http_referer" "$http_user_agent"';

server {
    listen 443 ssl;
    server_name price.example.com;

    ssl_certificate /etc/nginx/tls/price.example.com.crt;
    ssl_certificate_key /etc/nginx/tls/price.example.com.key;
    access_log /var/log/nginx/quickprice.access.log quickprice_safe;
    client_max_body_size 64k;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;

    location = /internal/logs/stream {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-API-Key $http_x_api_key;
        proxy_set_header Last-Event-ID $http_last_event_id;
        proxy_connect_timeout 3s;
        proxy_read_timeout 1h;
        proxy_send_timeout 30s;
        proxy_buffering off;
        proxy_cache off;
        gzip off;
    }

    location = /admin-api/instrument-catalog/import {
        client_max_body_size 8m;
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 3s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 3s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }
}
