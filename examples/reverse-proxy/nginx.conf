# Optional Nginx virtual-host example. Replace the server name and certificate
# paths, then include this file from the active Nginx configuration.
log_format quickprice_safe '$remote_addr - $remote_user [$time_local] '
                           '"$request_method $uri $server_protocol" $status $body_bytes_sent '
                           '"$http_referer" "$http_user_agent"';

server {
    listen 443 ssl;
    server_name price.example.com;

    ssl_certificate /etc/nginx/tls/price.example.com.crt;
    ssl_certificate_key /etc/nginx/tls/price.example.com.key;
    access_log /var/log/nginx/quickprice.access.log quickprice_safe;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 3s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }
}
